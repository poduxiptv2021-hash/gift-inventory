    function bindEvents() {

      document.querySelectorAll("[data-nav]").forEach(btn => {
        btn.onclick = () => {

          render();
        };
      });

      if (state.view === "request") bindRequestEvents();
      if (state.view === "login") bindLoginEvents();
      if (state.view === "admin") bindAdminEvents();
    }

    function bindRequestEvents() {
      const form = document.getElementById("request-form");
      if (!form) return;

      const dateInput = document.getElementById("event-date-input");
      if (dateInput) {
        const updateDateClass = () => {
          if (dateInput.value) dateInput.classList.add("has-value");
          else dateInput.classList.remove("has-value");
        };
        dateInput.onchange = updateDateClass;
        dateInput.onblur = updateDateClass;
        updateDateClass();
      }

      document.querySelectorAll("[data-toggle-gift]").forEach(btn => {
        btn.onclick = () => {
          const gid = btn.dataset.toggleGift;
          if (state.selectedGifts[gid]) {
            delete state.selectedGifts[gid];
          } else {
            state.selectedGifts[gid] = 1;
          }
          refreshRequestUI();
        };
      });

      document.querySelectorAll("[data-qty-gift]").forEach(input => {
        input.oninput = (e) => {
          const gid = input.dataset.qtyGift;
          state.selectedGifts[gid] = parseInt(e.target.value) || 0;
          refreshRequestUI();
        };
      });

      function refreshRequestUI() {
        const summaryContainer = document.getElementById("order-summary-container");
        const selectedEntries = Object.entries(state.selectedGifts);
        
        summaryContainer.innerHTML = orderSummaryHTML(selectedEntries);

        document.querySelectorAll(".gift-option").forEach(opt => {
          const gid = opt.dataset.giftId;
          if (state.selectedGifts[gid]) {
            opt.classList.add("selected");
          } else {
            opt.classList.remove("selected");
          }
        });

        updateStockWarnings();
      }

      function updateStockWarnings() {
        const container = document.getElementById("stock-warnings");
        if (!container) return;
        container.innerHTML = "";
        
        Object.entries(state.selectedGifts).forEach(([gid, qty]) => {
          const g = state.gifts.find(item => item.id === gid);
          if (g && qty > g.quantity) {
            const div = document.createElement("div");
            div.className = "flex items-center gap-2 text-[10px] font-bold text-red-600 uppercase";
            div.innerHTML = `${ICONS.alert} Overstock: ${g.name} (Max: ${g.quantity})`;
            container.appendChild(div);
          }
        });
      }

      form.onsubmit = (ev) => {
        ev.preventDefault();
        const fd = new FormData(form);
        const selectedIds = Object.keys(state.selectedGifts).filter(id => state.selectedGifts[id] > 0);
        
        if (selectedIds.length === 0) { 
          notify("Please select at least one gift", "error"); 
          return; 
        }
        
        for (const gid of selectedIds) {
          const g = state.gifts.find(item => item.id === gid);
          if (state.selectedGifts[gid] > g.quantity) {
            notify(`Quantity for ${g.name} exceeds stock`, "error");
            return;
          }
        }


state.currentRequestData = {

  requesterName: fd.get("requesterName"),

  department: fd.get("department"),

  email: fd.get("email"),

  company: fd.get("company"),

  mobileNo: fd.get("mobileNo"),

  eventName: fd.get("eventName"),

  eventDate: fd.get("eventDate"),

  reason: fd.get("reason"),

  selectedItems: selectedIds.map(id => ({
      name: state.gifts.find(g => g.id === id).name,
      qty: state.selectedGifts[id]
  }))
};


        openConfirmationModal();
      };
    }

console.log(state.currentRequestData);

}
        
        modalRoot.innerHTML = `
          <div class="card w-full max-w-md text-center py-12 shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="flex justify-center mb-6">${ICONS.check_circle}</div>
            <h2 class="text-xl font-bold mb-2">Submission Successful</h2>
            <p class="text-sm text-gray-500 mb-8 max-w-[280px] mx-auto">Your inventory request has been received. CCD will review and provide confirmation shortly.</p>
            <button id="modal-close-success" class="btn-primary w-full brand-submit">Back to Portal</button>
          </div>
        `;

        document.getElementById("modal-close-success").onclick = () => {
          modalRoot.innerHTML = "";
          state.selectedGifts = {};
          state.currentRequestData = null;
          render();
        };
      } catch (err) {
        notify("Error submitting requests", "error");
        modalRoot.innerHTML = "";
      }
    }

    function bindLoginEvents() {
      const f = document.getElementById("login-form");
      if (!f) return;
      f.onsubmit = (ev) => {
        ev.preventDefault();
        if (ev.target.password.value === CCD_PASSWORD) { state.authed = true; state.view = "admin"; render(); }
        else document.getElementById("login-error").textContent = "ACCESS DENIED";
      };
    }

    function bindAdminEvents() {
      document.querySelectorAll("[data-tab]").forEach(btn => {
        btn.onclick = () => { state.adminTab = btn.dataset.tab; render(); };
      });
      document.getElementById("logout-btn").onclick = () => { state.authed = false; state.view = "request"; render(); };
      
      if (state.adminTab === "inventory") {

    const search = document.getElementById("inv-search");

    if(search)
        search.oninput = (e) => {
            state.inventoryQuery = e.target.value;
        };

    const refreshInventoryBtn =
        document.getElementById("refresh-inventory");

    if (refreshInventoryBtn) {
        refreshInventoryBtn.onclick = () => {
            loadAll();
        };
    }

    document.querySelectorAll("[data-remove-gift]").forEach(btn => {
        btn.onclick = () => {
            if(confirm("Confirm removal?")) {
                persistGifts(
                    state.gifts.filter(
                        g => g.id !== btn.dataset.removeGift
                    )
                );
                render();
            }
        };
    });
}

      if (state.adminTab === "requests") {
        const refreshBtn = document.getElementById("refresh-requests");
        if (refreshBtn) {
          refreshBtn.onclick = () => loadAll();
        }
        document.querySelectorAll("[data-filter]").forEach(btn => {
          btn.onclick = () => { state.requestFilter = btn.dataset.filter; render(); };
        });
        document.querySelectorAll("[data-approve]").forEach(btn => {
          btn.onclick = () => { persistRequests(state.requests.map(r => r.id == btn.dataset.approve ? {...r, status: "approved"} : r)); render(); };
        });
        document.querySelectorAll("[data-issue]").forEach(btn => {
          btn.onclick = () => { persistRequests(state.requests.map(r => r.id == btn.dataset.issue ? {...r, status: "issued"} : r)); render(); };
        });
      }
    }

function renderCharts() {

  if (typeof Chart === "undefined") {
    console.error("Chart.js not loaded");
    return;
  }

  Chart.getChart("stockChart")?.destroy();
  Chart.getChart("statusChart")?.destroy();

  const stockCtx = document.getElementById("stockChart");

  if (stockCtx && state.gifts.length > 0) {
    new Chart(stockCtx, {
      type: "bar",
      data: {
        labels: state.gifts.map(g => g.name),
        datasets: [{
          label: "Stock Qty",
          data: state.gifts.map(g => g.quantity),
          backgroundColor: "#000000"
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  }

  const statusCtx = document.getElementById("statusChart");

  if (statusCtx) {

    const counts = {
      pending: 0,
      approved: 0,
      issued: 0,
      rejected: 0
    };

    state.requests.forEach(r => counts[r.status]++);

    new Chart(statusCtx, {
      type: "doughnut",
      data: {
        labels: Object.keys(counts),
        datasets: [{
          data: Object.values(counts),
          backgroundColor: [
            "#000000",
            "#444444",
            "#888888",
            "#CCCCCC"
          ]
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: "70%",
        plugins: {
          legend: {
            position: "bottom"
          }
        }
      }
    });

  }
}
    loadAll();
  </script>
</body></html>
